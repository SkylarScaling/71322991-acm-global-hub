---
- name: "Wait for GitOps Operator CSV to be installed"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: openshift-gitops-operator
    namespace: "{{ gitops_operator_namespace }}"
  register: gitops_sub
  until: gitops_sub.resources[0].status.currentCSV is defined
  retries: 30
  delay: 10

- name: "Wait for the GitOps Operator Deployment to be Ready"
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ gitops_operator_namespace }}"
    label_selectors:
      - "operators.coreos.com/openshift-gitops-operator.{{ gitops_operator_namespace }}="
  register: gitops_deployment
  until:
    - gitops_deployment.resources | length > 0
    - gitops_deployment.resources[0].status.availableReplicas is defined
    - gitops_deployment.resources[0].status.availableReplicas > 0
  retries: 60
  delay: 10

- name: "Wait for the default openshift-gitops ArgoCD instance to be auto-created by the Operator"
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1alpha1
    kind: ArgoCD
    name: openshift-gitops # Default name for the OpenShift GitOps instance
    namespace: openshift-gitops
  register: default_argocd
  until: default_argocd.resources | length > 0
  # Wait up to 5 minutes (30 * 10s) for the operator to scaffold the instance
  retries: 30
  delay: 10

- name: "Teach ArgoCD how to evaluate OLM health (Patch)"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: argoproj.io/v1alpha1
      kind: ArgoCD
      metadata:
        name: openshift-gitops
        namespace: openshift-gitops
      spec:
        resourceHealthChecks:
          - group: operators.coreos.com
            kind: Subscription
            check: |
              hs = {}
              hs.status = "Progressing"
              hs.message = "Waiting for Subscription to resolve..."
              if obj.status ~= nil then
                if obj.status.conditions ~= nil then
                  for i, condition in ipairs(obj.status.conditions) do
                    if condition.status == "True" then
                      if condition.type == "ResolutionFailed" or 
                         condition.type == "CatalogSourcesUnhealthy" or 
                         condition.type == "InstallPlanMissing" then
                        hs.status = "Degraded"
                        hs.message = (condition.reason or condition.type) .. ": " .. (condition.message or "Unknown error")
                        return hs
                      end
                    end
                  end
                end
                if obj.status.installedCSV ~= nil then
                  hs.status = "Healthy"
                  hs.message = "CSV " .. obj.status.installedCSV .. " is installed"
                  return hs
                end
              end
              return hs

          - group: operators.coreos.com
            kind: ClusterServiceVersion
            check: |
              hs = {}
              hs.status = "Progressing"
              hs.message = "Waiting for CSV phase..."
              if obj.status ~= nil and obj.status.phase ~= nil then
                local phase = obj.status.phase
                local message = obj.status.message or obj.status.reason or ("CSV is " .. phase)
              
                if phase == "Succeeded" then
                  hs.status = "Healthy"
                  hs.message = "Operator is running: " .. message
                  return hs
                end
                if phase == "Failed" then
                  hs.status = "Degraded"
                  hs.message = "Operator failed: " .. message
                  return hs
                end
                if phase == "Pending" or phase == "Installing" or phase == "Replacing" then
                  hs.status = "Progressing"
                  hs.message = message
                  return hs
                end
              
                hs.status = "Unknown"
                hs.message = "Unknown CSV phase: " .. phase
                return hs
              end
              return hs
  register: argocd_patch
  until: argocd_patch is not failed
  retries: 12
  delay: 10

- debug:
    msg: "OpenShift GitOps installed successfully. The default '{{ gitops_operator_namespace }}' namespace should now be initializing."