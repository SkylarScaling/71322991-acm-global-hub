---
- name: Wait for the Global Hub (MultiClusterHub) to be fully Running
  kubernetes.core.k8s_info:
    kubeconfig: "{{ target_kubeconfig }}"
    api_version: operator.open-cluster-management.io/v1
    kind: MultiClusterHub
    name: multiclusterhub
    namespace: open-cluster-management
  register: mch_status
  until:
    - mch_status.resources | length > 0
    - mch_status.resources[0].status is defined
    - mch_status.resources[0].status.phase | default('') == 'Running'
  retries: 180  # Wait up to 30 minutes for the Hub to fully initialize
  delay: 10

- name: Configure Regional Hub Add-on Strategies (On Global Hub)
  kubernetes.core.k8s:
    kubeconfig: "{{ target_kubeconfig }}"
    state: present
    template: "regional-hubs-strategy.yaml.j2"
  loop:
    - governance-policy-framework
    - config-policy-controller