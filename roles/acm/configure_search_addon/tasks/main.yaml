---
- name: Wait for ManagedClusterAddOn CRD to be registered by the Hub Operator
  kubernetes.core.k8s_info:
    kubeconfig: "{{ target_kubeconfig }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: managedclusteraddons.addon.open-cluster-management.io
  register: crd_check
  until:
    - crd_check.resources is defined
    - crd_check.resources | length > 0
  retries: 180
  delay: 10

- name: Wait for target cluster namespaces to exist
  kubernetes.core.k8s_info:
    kubeconfig: "{{ target_kubeconfig }}"
    api_version: v1
    kind: Namespace
    name: "{{ item }}"
  register: ns_check
  until:
    - ns_check.resources is defined
    - ns_check.resources | length > 0
  retries: 60  # Wait up to 10 minutes for the namespace to be scaffolded/provisioned
  delay: 10
  loop: "{{ search_target_namespaces }}"

- name: Enable Search Collector in target cluster namespaces
  kubernetes.core.k8s:
    kubeconfig: "{{ target_kubeconfig }}"
    state: present
    definition:
      apiVersion: addon.open-cluster-management.io/v1alpha1
      kind: ManagedClusterAddOn
      metadata:
        name: search-collector
        namespace: "{{ item }}"
      spec: {}
  loop: "{{ search_target_namespaces }}"