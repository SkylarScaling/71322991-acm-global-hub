---
- name: Read Spoke Kubeconfig from disk
  ansible.builtin.slurp:
    src: "{{ spoke_kubeconfig }}"
  register: spoke_kubeconfig_raw

# Create ManagedCluster first so ACM doesn't garbage collect the namespace
- name: Create ManagedCluster object on Hub
  kubernetes.core.k8s:
    kubeconfig: "{{ hub_kubeconfig }}"
    state: present
    template: "01-managed-cluster.yaml.j2"

- name: Create Spoke Cluster Namespace on Hub
  kubernetes.core.k8s:
    kubeconfig: "{{ hub_kubeconfig }}"
    state: present
    template: "02-namespace.yaml.j2"

- name: Create auto-import-secret on Hub
  kubernetes.core.k8s:
    kubeconfig: "{{ hub_kubeconfig }}"
    state: present
    template: "03-auto-import-secret.yaml.j2"

- name: Wait for Spoke Cluster to join the Hub
  kubernetes.core.k8s_info:
    kubeconfig: "{{ hub_kubeconfig }}"
    api_version: cluster.open-cluster-management.io/v1
    kind: ManagedCluster
    name: "{{ cluster_name }}"
  register: mc_status
  until: >
    mc_status.resources | length > 0 and
    mc_status.resources[0].status is defined and
    mc_status.resources[0].status.conditions is defined and
    (mc_status.resources[0].status.conditions | selectattr('type', 'equalto', 'ManagedClusterJoined') | selectattr('status', 'equalto', 'True') | list | length > 0)
  retries: 60
  delay: 10