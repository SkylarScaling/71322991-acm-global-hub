---
- name: Install OCP on AWS
  gather_facts: false
  hosts: localhost
  tasks:
    - debug:
        msg: "Provisioning and Configuring OCP Cluster on AWS"

- name: Install Pre-requisites
  ansible.builtin.import_playbook: ocp/install-ocp-prerequisites.yaml

- name: Provision OCP Cluster on AWS via IPI
  ansible.builtin.import_playbook: ocp/provision-cluster.yaml

- name: Display Credentials
  hosts: localhost
  connection: local
  gather_facts: false
  environment:
    KUBECONFIG: "{{ install_dir }}/{{ ocp_cluster.name }}/auth/kubeconfig"
  tasks:
    - name: Fetch kubeadmin password from install directory
      ansible.builtin.slurp:
        src: "{{ install_dir }}/{{ ocp_cluster.name }}/auth/kubeadmin-password"
      register: kubeadmin_password_raw

    - name: Set cluster credentials fact
      ansible.builtin.set_fact:
        kubeadmin_password: "{{ kubeadmin_password_raw.content | b64decode }}"

    - name: Print Final Cluster Handoff Details
      ansible.builtin.debug:
        msg:
          - "=================================================================="
          - "🎉 CLUSTER PROVISIONING AND GITOPS DEPLOYMENT COMPLETE! 🎉"
          - "=================================================================="
          - "Cluster Name: {{ ocp_cluster.name }}"
          - "OCP Version:  {{ openshift_version }}.{{ ocp_patch_version }}"
          - "Web Console:  https://console-openshift-console.apps.{{ ocp_cluster.name }}.{{ ocp_cluster.base_domain }}/"
          - "Username:     kubeadmin"
          - "Password:     {{ kubeadmin_password }}"
          - "=================================================================="
          - "All ArgoCD Applications are Healthy and Synced."
...