---
- name: Install Day 2 Config via OpenShift GitOps (ArgoCD)
  hosts: localhost
  vars_files:
    - ../group_vars/all.yaml
  connection: local
  gather_facts: false
  environment:
    KUBECONFIG: "{{ install_dir }}/{{ ocp_cluster.name }}/auth/kubeconfig"

  roles:
    - role: apps_install_acm
    - role: apps_install_odf
    - role: apps_install_coo
    - role: apps_install_mco